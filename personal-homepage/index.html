<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HLQS 的个人小站</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page-wrap">
    <!-- 顶栏 -->
    <header class="site-header">
      <div class="header-inner">
        <div class="header-text">
          <span class="site-badge">HLQS 的小窝</span>
          <span class="site-sub">进来坐坐，聊聊天</span>
        </div>
        <span class="online-dot" title="在线">在线</span>
      </div>
    </header>

    <main class="main-layout">
    <div class="main-grid">
      <!-- 左侧：个人资料 -->
      <section class="panel profile-panel">
        <div class="panel-title panel-title--profile">你好呀</div>
        <div class="profile-card">
          <div class="avatar-wrap">
            <img id="avatarImg" src="assets/avatar.svg" alt="HLQS 头像" class="avatar" width="120" height="120">
            <label class="avatar-upload-btn">
              <input type="file" id="avatarInput" accept="image/jpeg,image/png,image/gif,image/webp" hidden>
              更换头像
            </label>
          </div>
          <h1 class="name">HLQS</h1>
          <p class="tagline">我正在学习计算机网络，逆向工程和其他计算机知识</p>
        </div>

        <div class="info-box">
          <h2 class="info-title">随便了解我一下</h2>
          <table class="info-table">
            <tr>
              <th>身份</th>
              <td>普通大学生</td>
            </tr>
            <tr>
              <th>最近在忙</th>
              <td>逆向工程实验、计算机网络 PJ、反编译器</td>
            </tr>
            <tr>
              <th>兴趣</th>
              <td>东方同人曲、游戏</td>
            </tr>
            <tr>
              <th>特点</th>
              <td>做题蛆，？！蛆蛆！？</td>
            </tr>
            <tr>
              <th>联系</th>
              <td>
                <a href="mailto:pearcehlqs114@gmail.com">pearcehlqs114@gmail.com</a><br>
                <a href="https://github.com/HLQS9" target="_blank" rel="noopener noreferrer">GitHub @HLQS9</a>
              </td>
            </tr>
          </table>
        </div>
      </section>

      <!-- 右侧：数字分身聊天 -->
      <section class="panel chat-panel">
        <div class="panel-title panel-title--chat">来跟我聊聊</div>
        <p class="chat-intro">嗨～我是 HLQS 的数字分身，随便问点什么都可以。</p>

        <div id="chatLog" class="chat-log" aria-live="polite"></div>

        <div class="quick-questions">
          <span class="quick-label">或者点这些开始聊：</span>
          <div class="quick-btns">
            <button type="button" class="btn-quick" data-q="你的网站有什么亮点？">Q1 网站亮点</button>
            <button type="button" class="btn-quick" data-q="你的学习情况怎么样？">Q2 学习情况</button>
            <button type="button" class="btn-quick" data-q="你的兴趣是什么？">Q3 兴趣爱好</button>
          </div>
        </div>

        <form id="chatForm" class="chat-form">
          <input
            type="text"
            id="chatInput"
            class="chat-input"
            placeholder="想说点什么？输入后回车或点发送…"
            autocomplete="off"
            maxlength="200"
          >
          <button type="submit" class="btn-glossy btn-send">发送</button>
        </form>
        <p id="chatMode" class="chat-mode" aria-live="polite">对话模式：检测中…</p>
      </section>
    </div>

    <!-- 音乐播放器（独立模块，位于关于我与数字分身下方） -->
    <section class="panel music-panel">
      <div class="panel-title">
        <span class="panel-icon">◎</span> 背景音乐
      </div>
      <div class="music-panel-body">
        <input type="search" id="musicSearch" class="music-search" placeholder="搜索曲名…" autocomplete="off">
        <nav id="musicNav" class="music-nav" aria-label="音乐文件夹"></nav>
        <div class="player-layout">
          <img id="coverImg" class="cover-img" src="assets/avatar.svg" alt="当前曲目封面" width="72" height="72">
          <div class="player-main">
            <p id="trackTitle" class="track-title">未配置曲目</p>
            <div class="progress-row">
              <span id="timeCurrent" class="time-label">0:00</span>
              <input type="range" id="progress" class="progress-slider" min="0" max="100" value="0" title="播放进度">
              <span id="timeTotal" class="time-label">0:00</span>
            </div>
            <div class="player-controls">
              <button type="button" id="prevBtn" class="btn-glossy btn-mini" title="上一首">⏮</button>
              <button type="button" id="playBtn" class="btn-glossy btn-mini">▶</button>
              <button type="button" id="nextBtn" class="btn-glossy btn-mini" title="下一首">⏭</button>
              <label class="vol-label" for="volume">音量</label>
              <input type="range" id="volume" class="volume-slider" min="0" max="1" step="0.05" value="0.6" title="音量">
            </div>
            <ul id="playlistEl" class="playlist"></ul>
          </div>
        </div>
        <audio id="bgm" preload="metadata"></audio>
      </div>
    </section>
    </main>

    <footer class="site-footer">
      <p>欢迎来玩 · 给朋友看的小站 · 2010 怀旧风 v0.1</p>
    </footer>
  </div>

  <script src="js/site-config.js"></script>
  <script src="js/api-base.js"></script>
  <script src="js/avatar.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
